<svg width="200" height="200" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 科技感蓝色渐变 -->
        <linearGradient id="techBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0072FF;stop-opacity:1" />
        </linearGradient>

        <!-- 内部发光滤镜 -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- 背景圆（科技蓝渐变，带发光） -->
    <circle cx="512" cy="512" r="450" fill="url(#techBlue)" filter="url(#glow)" opacity="0.15"/>

    <!-- 主图标（深色，微立体感） -->
    <path d="M512 384 L704 256 L704 768 L512 896 L320 768 L320 256 Z"
          fill="#0055AA"
          stroke="#0072FF"
          stroke-width="4"/>

    <!-- 内部M形（亮色，发光效果） -->
    <path d="M384 416 L384 608 L448 608 L448 512 L576 512 L576 608 L640 608 L640 416"
          fill="#00C6FF"
          filter="url(#glow)"/>

    <!-- 底部装饰（透明蓝色） -->
    <path d="M320 768 L512 896 L704 768"
          fill="#0072FF"
          opacity="0.3"/>
</svg>
